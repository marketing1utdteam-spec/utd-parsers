name: B2B — Cold Send

on:
  workflow_dispatch: {}   # schedule moved to outreach-dispatcher

permissions:
  contents: write

concurrency:
  group: b2b_sender
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run b2b_sender
        env:
          STATE_DIR: ./data
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PW_SERGEY: ${{ secrets.GMAIL_APP_PW_SERGEY }}
          GMAIL_APP_PW_SERGE: ${{ secrets.GMAIL_APP_PW_SERGE }}
          GMAIL_APP_PW_SERGI: ${{ secrets.GMAIL_APP_PW_SERGI }}
          GMAIL_APP_PW_SERHII: ${{ secrets.GMAIL_APP_PW_SERHII }}
          B2B_SHEET_ID: ${{ vars.B2B_SHEET_ID }}
          UTD_MAIL_SERGEY: ${{ vars.UTD_MAIL_SERGEY }}
        run: python b2b_sender.py
      - name: Commit updated state
        if: always()
        run: |
          git config user.name  "utd-parser-bot"
          git config user.email "utd-parser-bot@users.noreply.github.com"
          git add data/*.json 2>/dev/null || true
          git commit -m "b2b_sender state: $(date -u +%F\ %T)" || echo "no state changes"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash || true
            git push && break
            sleep $((i*3))
          done || echo "nothing to push"
