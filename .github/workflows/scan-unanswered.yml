name: Scan unanswered inbound (one-off)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Scan unanswered
        env:
          INBOX_FETCH_LIMIT: '2000'
          SCAN_LOOKBACK_DAYS: '21'
          GMAIL_APP_PW_SERGEY: ${{ secrets.GMAIL_APP_PW_SERGEY }}
          GMAIL_APP_PW_SERGE: ${{ secrets.GMAIL_APP_PW_SERGE }}
          UTD_MAIL_SERGEY: ${{ vars.UTD_MAIL_SERGEY }}
          UTD_MAIL_SERGE: ${{ vars.UTD_MAIL_SERGE }}
          UTD_MAIL_SERGI: ${{ vars.UTD_MAIL_SERGI }}
          UTD_MAIL_SERHII: ${{ vars.UTD_MAIL_SERHII }}
          UTD_MAIL_DENYS: ${{ vars.UTD_MAIL_DENYS }}
        run: python scan_unanswered.py
