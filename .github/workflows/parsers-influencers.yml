name: Influencer Parser — Daily

on:
  schedule:
    - cron: '0 6 * * *'       # ~morning run  (UTC; GitHub may delay a few hours)
    - cron: '0 18 * * *'      # ~evening run  → twice a day
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: influencer-parser
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run influencer scraper
        env:
          STATE_DIR: ./data
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_API_KEYS: ${{ secrets.GOOGLE_API_KEYS }}
          GOOGLE_CSE_IDS: ${{ secrets.GOOGLE_CSE_IDS }}
          CSE_BUDGET: '200'
          YT_BUDGET: '100'
          NOTIFY_URL: 'https://utdteam.app.n8n.cloud/webhook/utd-parser-notify'
        run: python run.py influencers

      - name: Commit updated dedup state
        if: always()
        run: |
          git config user.name  "utd-parser-bot"
          git config user.email "utd-parser-bot@users.noreply.github.com"
          git add data/*.json 2>/dev/null || true
          git commit -m "influencer state: $(date -u +%F)" || echo "no state changes"
          git pull --rebase --autostash || true
          git push || echo "nothing to push"
