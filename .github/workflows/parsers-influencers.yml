name: Influencer Parser — Daily

on:
  schedule:
    - cron: '29 5 * * *'       # ~morning run  (UTC; GitHub may delay a few hours)
    - cron: '51 17 * * *'      # ~evening run  → twice a day
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: influencer-parser
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run influencer scraper
        env:
          STATE_DIR: ./data
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_API_KEYS: ${{ secrets.GOOGLE_API_KEYS }}
          GOOGLE_CSE_IDS: ${{ secrets.GOOGLE_CSE_IDS }}
          # Общий пул ~7 рабочих CSE-ключей; из них YouTube API есть только у 3.
          # Без KEY_SLICE. Бюджет ужат под общий лимит ~700 CSE/день на все парсеры.
          CSE_BUDGET: '50'           # 50 × 2 прогона = 100 CSE/день
          YT_BUDGET: '60'
          SEARCH_PAGES: '2'          # страниц выдачи CSE на запрос (как в b2b)
          # Пороги ослаблены 2026-07-13 — прежние (500/4/3) отсеивали почти всё,
          # выход был ~10 контактов/день. Ниже пороги = больше валидных креаторов.
          MIN_YT_SUBSCRIBERS: '250'  # порог подписчиков YT-канала (было 500)
          MIN_ACTIVITY_SCORE: '3'    # порог активности блога из 8 (было 4)
          MIN_SHOPIFY_ARTICLES: '2'  # мин. статей про Shopify у блога (было 3)
          NOTIFY_URL: 'https://utdteam.app.n8n.cloud/webhook/utd-parser-notify'
          INFL_SHEET_ID: ${{ vars.INFL_SHEET_ID }}
        run: python run.py influencers

      - name: Commit updated dedup state
        if: always()
        run: |
          git config user.name  "utd-parser-bot"
          git config user.email "utd-parser-bot@users.noreply.github.com"
          git add data/*.json 2>/dev/null || true
          git commit -m "influencer state: $(date -u +%F)" || echo "no state changes"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash || true
            git push && break
            sleep $((i*3))
          done || echo "nothing to push"
