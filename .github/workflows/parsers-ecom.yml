name: Ecom Parser — Shopify Stores

on:
  # Запущен 2026-07-06 по команде владельца.
  #    Предлагаемые слоты (UTC, «кривые» минуты, чтобы не толкаться с b2b/influencers):
  schedule:
    - cron: '33 4 * * *'      # ~утренний прогон
    - cron: '9 15 * * *'      # ~дневной прогон (2 раза в день)
  workflow_dispatch: {}          # manual "Run workflow" button only

permissions:
  contents: write                # allow committing the dedup state back

concurrency:
  group: ecom-parser
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run ecom harvester
        env:
          STATE_DIR: ./data
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_API_KEYS: ${{ secrets.GOOGLE_API_KEYS }}
          GOOGLE_CSE_IDS: ${{ secrets.GOOGLE_CSE_IDS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # ⚠️ создать таблицу (лист "Contacts", колонки A–O), расшарить на
          #    сервис-аккаунт и вписать её id сюда:
          ECOM_SHEET_ID: ${{ vars.ECOM_SHEET_ID }}
          ECOM_SHEET_TAB: 'Ecom Contacts'
          MAILBOX_PROVIDER: ''          # free gauntlet only (MX+domain+live)
          # РЕАЛЬНАЯ ёмкость пула: рабочих CSE-ключей всего ~7 (≈700 запросов/день),
          # 14 из 21 мертвы (accessNotConfigured / нет доступа к CSE JSON API).
          # Без KEY_SLICE — общий пул; мёртвые ключи парсер сам отбрасывает.
          # Бюджеты подобраны так, чтобы 2 прогона всех парсеров влезли в ~700/день:
          # ecom 80×2стр×2прог=320 + b2b 240 + infl ~100 ≈ 660 ≤ 700.
          KEY_SLICE: '4:6'              # 2 выделенных рабочих ключа
          MAX_GOOGLE_QUERIES: '80'      # топ-парсер по выходу — берёт больше пула
          SEARCH_PAGES: '2'             # брать 2 страницы выдачи на запрос
          NOTIFY_URL: 'https://utdteam.app.n8n.cloud/webhook/utd-parser-notify'
        run: python run.py ecom

      - name: Commit updated dedup state
        if: always()
        run: |
          git config user.name  "utd-parser-bot"
          git config user.email "utd-parser-bot@users.noreply.github.com"
          git add data/*.json 2>/dev/null || true
          git commit -m "ecom state: $(date -u +%F)" || echo "no state changes"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash || true
            git push && break
            sleep $((i*3))
          done || echo "nothing to push"
