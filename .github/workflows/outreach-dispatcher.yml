name: Outreach Dispatcher

# RUNS ENTIRELY IN GITHUB'S CLOUD — the owner's computer does NOT need to be on.
# GitHub throttles the schedule cron hard (it fired ~1×/day), so the workflow
# SELF-PERPETUATES: each run ends by triggering the next via DISPATCH_PAT, giving
# continuous coverage with no local machine involved. The schedule cron is only a
# restart safety-net in case the self-dispatch chain ever breaks. Public repo =
# unlimited free Actions minutes, so this is free.
on:
  schedule:
    - cron: '7 */3 * * *'   # safety-net restart (throttled; only used if the chain breaks)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: outreach-dispatcher
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run dispatcher
        env:
          STATE_DIR: ./data
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}   # lets the dispatcher trigger the parser workflows on a reliable schedule
          GOOGLE_API_KEYS: ${{ secrets.GOOGLE_API_KEYS }}   # ecom PageSpeed fallback key
          INBOX_FETCH_LIMIT: ${{ vars.INBOX_FETCH_LIMIT }}  # how many inbox msgs autoresponders scan (empty→400); raise for a deep backlog sweep
          GMAIL_APP_PW_SERGEY: ${{ secrets.GMAIL_APP_PW_SERGEY }}
          GMAIL_APP_PW_SERGE: ${{ secrets.GMAIL_APP_PW_SERGE }}
          UTD_MAIL_SERGEY: ${{ vars.UTD_MAIL_SERGEY }}
          UTD_MAIL_SERGE: ${{ vars.UTD_MAIL_SERGE }}
          UTD_MAIL_SERGI: ${{ vars.UTD_MAIL_SERGI }}
          UTD_MAIL_SERHII: ${{ vars.UTD_MAIL_SERHII }}
          UTD_MAIL_DENYS: ${{ vars.UTD_MAIL_DENYS }}
          B2B_SHEET_ID: ${{ vars.B2B_SHEET_ID }}
          SIGNED_NOTIFY_TO: ${{ vars.SIGNED_NOTIFY_TO }}   # who gets the "contract signed" alert (empty → code default)
          INFL_SHEET_ID: ${{ vars.INFL_SHEET_ID }}
          ECOM_SHEET_ID: ${{ vars.ECOM_SHEET_ID }}
          ECOM_SHEET_TAB: 'Ecom Contacts'
          MANAGER_EMAIL: ${{ vars.MANAGER_EMAIL }}
          CRM_STATS_TO: ${{ vars.CRM_STATS_TO }}
        run: python dispatcher.py
      - name: Commit updated state
        if: always()
        run: |
          git config user.name  "utd-parser-bot"
          git config user.email "utd-parser-bot@users.noreply.github.com"
          git add data/*.json 2>/dev/null || true
          git commit -m "dispatcher state: $(date -u +%F\ %T)" || echo "no state changes"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash || true
            git push && break
            sleep $((i*3))
          done || echo "nothing to push"

      # Cloud self-perpetuation: wait a bit (tick spacing), then trigger the next
      # run. Uses DISPATCH_PAT because the default GITHUB_TOKEN cannot start a new
      # workflow run. This is what keeps sending alive with the Mac powered off.
      - name: Schedule next cycle
        if: always()
        run: |
          sleep 1800   # 30-min cadence (was 600 = 10 min): halves per-cycle Claude/inbox cost; auto-replies still land within ~30 min, fine for cold outreach
          curl -s -o /dev/null -w "re-dispatch HTTP %{http_code}\n" -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"ref":"main"}' \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/outreach-dispatcher.yml/dispatches"
