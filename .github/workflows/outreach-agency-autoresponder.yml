name: Agency Partner — Autoresponder

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: agency_autoresponder
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run agency_autoresponder
        env:
          STATE_DIR: ./data
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PW_SERGEY: ${{ secrets.GMAIL_APP_PW_SERGEY }}
          GMAIL_APP_PW_SERGE: ${{ secrets.GMAIL_APP_PW_SERGE }}
          GMAIL_APP_PW_SERGI: ${{ secrets.GMAIL_APP_PW_SERGI }}
          GMAIL_APP_PW_SERHII: ${{ secrets.GMAIL_APP_PW_SERHII }}
        run: python agency_autoresponder.py
      - name: Commit updated state
        if: always()
        run: |
          git config user.name  "utd-parser-bot"
          git config user.email "utd-parser-bot@users.noreply.github.com"
          git add data/*.json 2>/dev/null || true
          git commit -m "agency_autoresponder state: $(date -u +%F\ %T)" || echo "no state changes"
          git pull --rebase --autostash || true
          git push || echo "nothing to push"
