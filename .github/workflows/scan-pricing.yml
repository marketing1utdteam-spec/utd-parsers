name: Scan mailbox for pricing emails (one-off)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Scan for pricing
        env:
          STATE_DIR: ./data
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          B2B_SHEET_ID: ${{ vars.B2B_SHEET_ID }}
          INBOX_FETCH_LIMIT: '4000'      # deep — scan the whole history
          SCAN_LOOKBACK_DAYS: '180'
          GMAIL_APP_PW_SERGEY: ${{ secrets.GMAIL_APP_PW_SERGEY }}
          GMAIL_APP_PW_SERGE: ${{ secrets.GMAIL_APP_PW_SERGE }}
          GMAIL_APP_PW_SERGI: ${{ secrets.GMAIL_APP_PW_SERGI }}
          GMAIL_APP_PW_SERHII: ${{ secrets.GMAIL_APP_PW_SERHII }}
          UTD_MAIL_SERGEY: ${{ vars.UTD_MAIL_SERGEY }}
          UTD_MAIL_SERGE: ${{ vars.UTD_MAIL_SERGE }}
          UTD_MAIL_SERGI: ${{ vars.UTD_MAIL_SERGI }}
          UTD_MAIL_SERHII: ${{ vars.UTD_MAIL_SERHII }}
          UTD_MAIL_DENYS: ${{ vars.UTD_MAIL_DENYS }}
        run: python scan_pricing.py
