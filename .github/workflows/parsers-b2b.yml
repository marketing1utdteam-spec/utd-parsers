name: B2B Parser — Daily

on:
  schedule:
    - cron: '17 5 * * *'      # 06:00 UTC — утренний прогон
    - cron: '43 13 * * *'     # 14:00 UTC — дневной прогон (2 раза в день)
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write              # allow committing the dedup state back

concurrency:
  group: b2b-parser
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run B2B harvester
        env:
          STATE_DIR: ./data
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_API_KEYS: ${{ secrets.GOOGLE_API_KEYS }}
          GOOGLE_CSE_IDS: ${{ secrets.GOOGLE_CSE_IDS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAILBOX_PROVIDER: ''          # free gauntlet only (MX+domain+live) — no MillionVerifier cost
          KEY_SLICE: '9:16'             # выделенные 7 ключей (700 CSE/день) — не конкурирует с ecom/infl
          MAX_GOOGLE_QUERIES: '170'     # 170 × 2 стр = ~340 вызовов/прогон × 2 прогона = 680 ≤ 700 слота (раньше 350 → второй прогон штормил на пустой квоте)
          SEARCH_PAGES: '2'             # брать 2 страницы выдачи на запрос (глубже, меньше повторов доменов)
          NOTIFY_URL: 'https://utdteam.app.n8n.cloud/webhook/utd-parser-notify'
          B2B_SHEET_ID: ${{ vars.B2B_SHEET_ID }}
        run: python run.py b2b

      - name: Commit updated dedup state
        if: always()
        run: |
          git config user.name  "utd-parser-bot"
          git config user.email "utd-parser-bot@users.noreply.github.com"
          git add data/*.json 2>/dev/null || true
          git commit -m "b2b state: $(date -u +%F)" || echo "no state changes"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash || true
            git push && break
            sleep $((i*3))
          done || echo "nothing to push"
