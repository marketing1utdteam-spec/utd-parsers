name: B2B Parser — Daily

on:
  schedule:                    # 5 прогонов/день, разнесены по суткам (парсер собирает 24/7)
    - cron: '17 2 * * *'
    - cron: '17 6 * * *'
    - cron: '17 10 * * *'
    - cron: '17 14 * * *'
    - cron: '17 18 * * *'
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write              # allow committing the dedup state back

concurrency:
  group: b2b-parser
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run B2B harvester
        env:
          STATE_DIR: ./data
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_API_KEYS: ${{ secrets.GOOGLE_API_KEYS }}
          GOOGLE_CSE_IDS: ${{ secrets.GOOGLE_CSE_IDS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAILBOX_PROVIDER: ''          # free gauntlet only (MX+domain+live) — no MillionVerifier cost
          # Общий пул ~7 рабочих CSE-ключей (~700/день). Без KEY_SLICE — мёртвые
          # ключи парсер сам отбрасывает. Бюджет ужат, чтобы 2 прогона всех
          # парсеров влезли в ~700/день (см. коммент в parsers-ecom.yml).
          MAX_GOOGLE_QUERIES: '60'      # 60 запросов/прогон
          SEARCH_PAGES: '3'             # 3 страницы выдачи Google на запрос (глубже — больше доменов; было 2)
          NOTIFY_URL: 'https://utdteam.app.n8n.cloud/webhook/utd-parser-notify'
          B2B_SHEET_ID: ${{ vars.B2B_SHEET_ID }}
        run: python run.py b2b

      - name: Commit updated dedup state
        if: always()
        run: |
          git config user.name  "utd-parser-bot"
          git config user.email "utd-parser-bot@users.noreply.github.com"
          git add data/*.json 2>/dev/null || true
          git commit -m "b2b state: $(date -u +%F)" || echo "no state changes"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash || true
            git push && break
            sleep $((i*3))
          done || echo "nothing to push"
